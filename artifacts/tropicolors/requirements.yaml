packages:
  "framer-motion": "For premium scroll animations and page transitions"
  "recharts": "For the admin dashboard monthly sales charts"
  "react-hook-form": "For robust contact and checkout form state management"
  "@hookform/resolvers": "Zod integration for form validation"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"
